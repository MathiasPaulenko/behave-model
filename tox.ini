[tox]
envlist = py311, py312, py313, lint
isolated_build = True

[testenv]
deps =
    -e ".[dev]"
commands =
    pytest {posargs:tests/} --cov=behave_model --cov-report=term-missing

[testenv:lint]
deps =
    ruff
commands =
    ruff check behave_model/ tests/
    ruff format --check behave_model/ tests/

[testenv:coverage]
deps =
    -e ".[dev]"
commands =
    pytest tests/ --cov=behave_model --cov-report=html --cov-report=xml
