site_name: behave-model
site_description: The canonical object model for Behave projects
site_url: https://mathiaspaulenko.github.io/behave-model/
repo_url: https://github.com/MathiasPaulenko/behave-model
repo_name: MathiasPaulenko/behave-model
edit_uri: edit/main/docs/

docs_dir: docs

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - navigation.tracking
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.code.select
    - content.tabs.link
    - content.tooltips
    - toc.follow
  palette:
    - scheme: default
      primary: deep purple
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Roboto
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
    logo: material/cube-outline
  favicon: assets/favicon.png

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quick_start.md
      - First Project: getting-started/first_project.md
  - Guides:
      - Domain Model: guides/domain_model.md
      - Gherkin v6 Rules: guides/rules.md
      - Visitors: guides/visitors.md
      - Query API: guides/queries.md
      - Serializers: guides/serializers.md
      - Transformations: guides/transformations.md
      - Validation: guides/validation.md
      - Statistics: guides/statistics.md
  - API Reference:
      - Overview: api/overview.md
      - Model Classes: api/model.md
      - Parser: api/parser.md
      - Visitors: api/visitors.md
      - Serializers: api/serializers.md
      - Transformations: api/transformations.md
      - Validation: api/validation.md
      - Exceptions: api/exceptions.md
  - Architecture:
      - Overview: architecture.md
      - Design Decisions: design_decisions.md
  - Examples: examples.md
  - Changelog: changelog.md
  - Contributing: contributing.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.snippets
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.caret
  - pymdownx.keys
  - tables
  - def_list
  - attr_list
  - md_in_html
  - footnotes
  - toc:
      permalink: true
      toc_depth: 3

plugins:
  - search:
      separator: '[\s\-,:!=\[\]()"/]+|(?!\b)(?=[A-Z][a-z])'
  - tags

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/MathiasPaulenko/behave-model
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/behave-model/
  status:
    new: New in v1.0.0
    deprecated: Deprecated

extra_css:
  - assets/extra.css
