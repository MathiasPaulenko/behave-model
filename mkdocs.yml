site_name: behave-model
site_description: The canonical object model for Behave projects
site_url: https://mathiaspaulenko.github.io/behave-model/
repo_url: https://github.com/MathiasPaulenko/behave-model
repo_name: MathiasPaulenko/behave-model
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  palette:
    - scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Quick Start: quick_start.md
  - API Reference: api_reference.md
  - Architecture: architecture.md
  - Contributing: contributing.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/MathiasPaulenko/behave-model
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/behave-model/
